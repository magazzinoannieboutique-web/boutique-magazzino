<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'DM Sans', system-ui, sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
      min-height: 100vh;
      font-family: var(--font);
    }

    .scan-wrap { max-width: 420px; margin: 0 auto; padding: 20px; }

    .mode-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: #1a1a1a;
      padding: 6px;
      border-radius: 12px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: #888;
      font-family: var(--font);
      transition: all 0.15s;
    }
    .mode-btn.active { background: white; color: #0f0f0f; }

    #reader {
      border-radius: 14px;
      overflow: hidden;
      background: #1a1a1a;
    }

    .result-card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 20px;
      margin-top: 16px;
      display: none;
    }
    .result-card.show { display: block; }

    .result-nome { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .result-sub { color: #888; font-size: 14px; }
    .result-prezzo { font-size: 24px; font-weight: 600; margin: 12px 0; }
    .result-stock { font-size: 14px; color: #aaa; }

    .result-foto {
      width: 100%;
      aspect-ratio: 3/2;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 14px;
      background: #111;
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      margin-top: 10px;
      transition: opacity 0.15s;
    }
    .action-btn:hover { opacity: 0.85; }
    .btn-vendi    { background: white; color: #0f0f0f; }
    .btn-foto     { background: #2a2a2a; color: white; border: 1px solid #444; }
    .btn-foto.uploaded { background: #1a3a2a; color: #6fcf97; border-color: #2d6a4f; }
    .btn-inventario { background: #2d6a4f; color: white; }
    .btn-rescan   { background: #2a2a2a; color: white; }

    .qty-wrap { display: flex; align-items: center; gap: 12px; margin: 14px 0; }
    .qty-btn {
      width: 40px; height: 40px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: white;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      font-family: var(--font);
    }
    .qty-val { font-size: 22px; font-weight: 600; min-width: 40px; text-align: center; }

    .speciale-badge {
      display: inline-block;
      background: #3d1f00;
      color: #f0a070;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .feedback {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback-icon { font-size: 56px; margin-bottom: 12px; }
    .feedback-testo { font-size: 18px; font-weight: 600; }
    .feedback-sub { color: #888; font-size: 14px; margin-top: 4px; }

    .divider {
      height: 1px;
      background: #2a2a2a;
      margin: 14px 0;
    }

    .foto-preview-wrap {
      display: none;
      margin-top: 10px;
    }
    .foto-preview-wrap img {
      width: 100%;
      border-radius: 10px;
      object-fit: cover;
      max-height: 200px;
    }
  </style>
</head>
<body>
<div class="scan-wrap">

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
    <div style="font-size:16px; font-weight:600;">📱 Scanner</div>
    <a href="index.html" style="color:#888; font-size:13px; text-decoration:none;">← Portale</a>
  </div>

  <!-- Selezione modalità -->
  <div class="mode-bar">
    <button class="mode-btn active" data-mode="vendita"    onclick="setMode('vendita')">🛍️ Vendita</button>
    <button class="mode-btn"        data-mode="inventario" onclick="setMode('inventario')">📦 Inventario</button>
    <button class="mode-btn"        data-mode="check"      onclick="setMode('check')">🔍 Check</button>
  </div>

  <!-- Scanner camera -->
  <div id="reader"></div>

  <!-- Feedback -->
  <div class="feedback" id="feedbackOk">
    <div class="feedback-icon" id="fbIcon">✅</div>
    <div class="feedback-testo" id="fbTesto"></div>
    <div class="feedback-sub" id="fbSub"></div>
    <button class="action-btn btn-rescan" style="margin-top:20px;" onclick="rescan()">Scansiona ancora</button>
  </div>

  <!-- Card risultato -->
  <div class="result-card" id="resultCard">

    <div id="rSpeciale" class="speciale-badge" style="display:none;">✂️ Modifica speciale</div>
    <img id="rFoto" class="result-foto" src="" alt="" style="display:none;">
    <div class="result-nome" id="rNome"></div>
    <div class="result-sub"  id="rSub"></div>
    <div class="result-prezzo" id="rPrezzo"></div>
    <div class="result-stock"  id="rStock"></div>

    <!-- MODALITÀ VENDITA -->
    <div id="azioniVendita">
      <button class="action-btn btn-vendi"  onclick="eseguiVendita()">✅ Segna come venduto</button>
      <button class="action-btn btn-rescan" onclick="rescan()">↩ Scansiona ancora</button>
    </div>

    <!-- MODALITÀ INVENTARIO -->
    <div id="azioniInventario" style="display:none;">
      <div style="font-size:13px; color:#888; margin-top:12px;">Aggiorna quantità:</div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="cambiaQty(-1)">−</button>
        <span class="qty-val" id="qtyVal">0</span>
        <button class="qty-btn" onclick="cambiaQty(1)">+</button>
      </div>

      <div class="divider"></div>

      <!-- Foto da inventario -->
      <div style="font-size:13px; color:#888; margin-bottom:8px;">Foto articolo:</div>
      <button class="action-btn btn-foto" id="btnFoto" onclick="apriCloudinaryScanner()">
        📷 Aggiungi / Cambia foto
      </button>
      <div class="foto-preview-wrap" id="fotoPreviewWrap">
        <img id="fotoPreviewImg" src="" alt="Preview foto">
        <div style="font-size:12px; color:#6fcf97; margin-top:6px; text-align:center;">✅ Foto caricata</div>
      </div>
      <input type="hidden" id="nuovaFotoUrl">

      <div class="divider"></div>

      <button class="action-btn btn-inventario" onclick="salvaQuantita()">💾 Salva tutto</button>
      <button class="action-btn btn-rescan"     onclick="rescan()">↩ Scansiona ancora</button>
    </div>

    <!-- MODALITÀ CHECK -->
    <div id="azioniCheck">
      <button class="action-btn btn-rescan" onclick="rescan()">↩ Scansiona ancora</button>
    </div>

  </div>

</div>

<script src="config.js"></script>
<script>
  let mode = 'vendita';
  let varianteCorrente = null;
  let qtyCorrente = 0;
  let scanner = null;
  let nuovaFotoUrl = null;

  // ============================================
  // AVVIA SCANNER
  // ============================================
  window.addEventListener('load', () => {
    scanner = new Html5Qrcode('reader');
    avviaScanner();
  });

  function avviaScanner() {
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 240 } },
      onScanSuccess,
      () => {}
    ).catch(err => {
      document.getElementById('reader').innerHTML =
        '<div style="padding:40px; text-align:center; color:#888;">⚠️ Fotocamera non accessibile.<br><small>' + err + '</small></div>';
    });
  }

  // ============================================
  // ON SCAN
  // ============================================
  async function onScanSuccess(qrCode) {
    await scanner.stop();

    // Notifica il portale
    await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'setScanResult', id_variante: qrCode })
    });

    // Carica dati variante
    const url = CONFIG.APPS_SCRIPT_URL + '?action=getVariante&id=' + encodeURIComponent(qrCode);
    const res = await fetch(url);
    const v = await res.json();

    if (v.error) {
      mostraFeedback('❌', 'Articolo non trovato', qrCode);
      return;
    }

    varianteCorrente = v;
    qtyCorrente = parseInt(v.Quantità) || 0;
    nuovaFotoUrl = null;
    mostraRisultato(v);
  }

  // ============================================
  // MOSTRA RISULTATO
  // ============================================
  function mostraRisultato(v) {
    document.getElementById('feedbackOk').classList.remove('show');
    document.getElementById('resultCard').classList.add('show');

    const speciale = v.Speciale === 'SI' || v.Speciale_Articolo === 'SI';
    document.getElementById('rSpeciale').style.display = speciale ? 'inline-block' : 'none';
    document.getElementById('rNome').textContent    = v.Nome || v.SKU;
    document.getElementById('rSub').textContent     = `${v.Taglia} · ${v.Colore} · ${v.Brand || ''}`;
    document.getElementById('rPrezzo').textContent  = '€ ' + (v.Prezzo || '—');
    document.getElementById('rStock').textContent   = `In magazzino: ${v.Quantità} pz`;

    if (v.Foto_URL) {
      document.getElementById('rFoto').src = v.Foto_URL;
      document.getElementById('rFoto').style.display = 'block';
    } else {
      document.getElementById('rFoto').style.display = 'none';
    }

    // Reset foto upload UI
    document.getElementById('nuovaFotoUrl').value = '';
    document.getElementById('fotoPreviewWrap').style.display = 'none';
    document.getElementById('btnFoto').classList.remove('uploaded');
    document.getElementById('btnFoto').textContent = '📷 Aggiungi / Cambia foto';

    // Mostra azioni per modalità corrente
    document.getElementById('azioniVendita').style.display    = mode === 'vendita'    ? 'block' : 'none';
    document.getElementById('azioniInventario').style.display = mode === 'inventario' ? 'block' : 'none';
    document.getElementById('azioniCheck').style.display      = mode === 'check'      ? 'block' : 'none';
    document.getElementById('qtyVal').textContent = qtyCorrente;
  }

  // ============================================
  // CLOUDINARY — apri dal telefono
  // ============================================
  function apriCloudinaryScanner() {
    const widget = cloudinary.createUploadWidget(
      {
        cloudName: CONFIG.CLOUDINARY_CLOUD_NAME,
        uploadPreset: CONFIG.CLOUDINARY_UPLOAD_PRESET,
        sources: ['camera', 'local'],  // camera prima per mobile
        multiple: false,
        maxFileSize: 5000000,
        transformation: [{ width: 800, crop: 'limit', quality: 'auto' }],
      },
      (error, result) => {
        if (!error && result && result.event === 'success') {
          nuovaFotoUrl = result.info.secure_url;
          document.getElementById('nuovaFotoUrl').value = nuovaFotoUrl;

          // Aggiorna UI
          document.getElementById('fotoPreviewImg').src = nuovaFotoUrl;
          document.getElementById('fotoPreviewWrap').style.display = 'block';
          document.getElementById('btnFoto').classList.add('uploaded');
          document.getElementById('btnFoto').textContent = '✅ Foto caricata — cambia';

          // Aggiorna anche la foto in alto nella card
          document.getElementById('rFoto').src = nuovaFotoUrl;
          document.getElementById('rFoto').style.display = 'block';
        }
      }
    );
    widget.open();
  }

  // ============================================
  // VENDITA
  // ============================================
  async function eseguiVendita() {
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'vendiVariante', id_variante: varianteCorrente.ID_Variante })
    });
    const data = await res.json();
    if (data.success) {
      mostraFeedback('✅', 'Vendita registrata!',
        `${varianteCorrente.Nome} · ${varianteCorrente.Taglia} ${varianteCorrente.Colore}`);
    } else {
      mostraFeedback('❌', data.error || 'Errore', '');
    }
  }

  // ============================================
  // INVENTARIO — salva quantità + eventuale foto
  // ============================================
  function cambiaQty(delta) {
    qtyCorrente = Math.max(0, qtyCorrente + delta);
    document.getElementById('qtyVal').textContent = qtyCorrente;
  }

  async function salvaQuantita() {
    // Salva quantità
    const resQty = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'aggiornaQuantita',
        id_variante: varianteCorrente.ID_Variante,
        quantita: qtyCorrente
      })
    });
    const dataQty = await resQty.json();
    if (!dataQty.success) {
      mostraFeedback('❌', dataQty.error || 'Errore quantità', '');
      return;
    }

    // Se c'è una nuova foto, salva anche quella
    if (nuovaFotoUrl) {
      await fetch(CONFIG.APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'aggiorneFoto',
          sku: varianteCorrente.SKU,
          foto_url: nuovaFotoUrl
        })
      });
    }

    const fotoMsg = nuovaFotoUrl ? ' + foto aggiornata' : '';
    mostraFeedback('💾', 'Salvato!',
      `${varianteCorrente.Nome} · ${varianteCorrente.Taglia} → ${qtyCorrente} pz${fotoMsg}`);
  }

  // ============================================
  // FEEDBACK + RESCAN
  // ============================================
  function mostraFeedback(icon, testo, sub) {
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('fbIcon').textContent  = icon;
    document.getElementById('fbTesto').textContent = testo;
    document.getElementById('fbSub').textContent   = sub;
    document.getElementById('feedbackOk').classList.add('show');
  }

  function rescan() {
    varianteCorrente = null;
    nuovaFotoUrl = null;
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('feedbackOk').classList.remove('show');
    avviaScanner();
  }

  // ============================================
  // MODALITÀ
  // ============================================
  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === m);
    });
    // Se c'è già una variante caricata, aggiorna le azioni visibili
    if (varianteCorrente) mostraRisultato(varianteCorrente);
  }
</script>
</body>
</html>
