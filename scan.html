<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5b87a0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Annie — Scanner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c0:#f0f5f8; --c1:#ddeaf1; --c2:#c4d9e6; --c3:#8ab4c8;
      --c4:#5b87a0; --c5:#3d6378; --c6:#1e3040;
      --font:'DM Sans',system-ui,sans-serif;
      --serif:'Cormorant Garamond',Georgia,serif;
    }
    html,body {
      min-height:100vh; font-family:var(--font); font-weight:300;
      color:var(--c6); -webkit-font-smoothing:antialiased;
      background:
        radial-gradient(ellipse at 20% 20%,rgba(91,135,160,0.22) 0%,transparent 55%),
        radial-gradient(ellipse at 80% 80%,rgba(61,99,120,0.18) 0%,transparent 55%),
        linear-gradient(145deg,#c8dce8 0%,#e8f0f5 100%);
      background-attachment:fixed;
    }
    .shell { max-width:440px; margin:0 auto; padding:14px 14px 48px; display:flex; flex-direction:column; gap:10px; }

    /* HEADER */
    .app-header {
      background:rgba(255,255,255,0.72); backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.9); border-radius:20px;
      padding:11px 18px; display:flex; align-items:center; justify-content:space-between;
      box-shadow:0 4px 16px rgba(30,48,64,0.10);
    }
    .logo-img { height:28px; width:auto; }
    .header-label { font-size:11px; color:var(--c3); letter-spacing:0.8px; text-transform:uppercase; }

    /* MODE BAR */
    .mode-bar {
      background:rgba(255,255,255,0.72); backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.9); border-radius:20px;
      padding:5px; display:flex; gap:4px;
      box-shadow:0 4px 16px rgba(30,48,64,0.08);
    }
    .mode-btn {
      flex:1; padding:9px 6px; border:none; border-radius:14px;
      font-size:13px; font-weight:400; font-family:var(--font);
      cursor:pointer; transition:all 0.18s; background:transparent; color:var(--c3);
    }
    .mode-btn.active { background:var(--c4); color:white; box-shadow:0 2px 10px rgba(91,135,160,0.4); }

    /* CONTENT CARD */
    .content-card {
      background:rgba(255,255,255,0.72); backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.9); border-radius:24px;
      overflow:hidden; box-shadow:0 8px 32px rgba(30,48,64,0.12);
    }

    /* VTAB BAR — singola/multipla */
    .vtab-bar {
      display:flex; gap:0; border-bottom:1px solid rgba(91,135,160,0.12);
    }
    .vtab-btn {
      flex:1; padding:13px 8px; border:none; background:transparent;
      font-size:13px; font-weight:400; font-family:var(--font); color:var(--c3);
      cursor:pointer; transition:all 0.18s; position:relative;
    }
    .vtab-btn.active { color:var(--c4); font-weight:500; }
    .vtab-btn.active::after {
      content:''; position:absolute; bottom:0; left:16px; right:16px;
      height:2px; background:var(--c4); border-radius:2px 2px 0 0;
    }
    /* Nascondi vtab in modalità non-vendita */
    .vtab-bar.hidden { display:none; }

    /* READER */
    #readerWrap { padding:18px; display:flex; flex-direction:column; gap:14px; }
    #reader { width:100% !important; border-radius:16px; overflow:hidden; min-height:60px; }
    #reader video { border-radius:16px; }
    .start-btn {
      width:100%; padding:15px; background:var(--c4); color:white;
      border:none; border-radius:999px; font-size:14px; font-family:var(--font);
      cursor:pointer; box-shadow:0 4px 14px rgba(91,135,160,0.4);
      transition:all 0.18s; font-weight:400;
    }
    .start-btn:hover { background:var(--c5); transform:translateY(-1px); }

    /* CARRELLO MULTIPLA (area persistente) */
    #carrelloArea { padding:0 18px 16px; display:none; flex-direction:column; gap:8px; }
    .carrello-box {
      background:rgba(91,135,160,0.06); border:1px solid rgba(91,135,160,0.15);
      border-radius:16px; overflow:hidden;
    }
    .carrello-head {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 14px; border-bottom:1px solid rgba(91,135,160,0.1);
    }
    .carrello-head-label { font-size:10px; font-weight:500; color:var(--c3); text-transform:uppercase; letter-spacing:1px; }
    .carrello-totale { font-family:var(--serif); font-size:17px; color:var(--c4); }
    .ci {
      display:flex; justify-content:space-between; align-items:center;
      padding:9px 14px; border-bottom:1px solid rgba(91,135,160,0.07);
    }
    .ci:last-child { border-bottom:none; }
    .ci-nome { font-size:13px; font-weight:500; color:var(--c6); }
    .ci-det  { font-size:11px; color:var(--c3); margin-top:1px; }
    .ci-right { display:flex; align-items:center; gap:6px; }
    .ci-prezzo { font-family:var(--serif); font-size:15px; color:var(--c4); }
    .ci-rm { background:none; border:none; color:var(--c3); cursor:pointer; font-size:13px; opacity:0.6; padding:2px 4px; }
    .ci-rm:hover { opacity:1; color:#b5451b; }
    .carrello-actions { display:flex; gap:8px; }

    /* RESULT */
    .result-inner { padding:18px; display:none; flex-direction:column; gap:10px; }
    .result-inner.show { display:flex; }
    .r-foto { width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:16px; display:none; }
    .r-foto.show { display:block; }
    .r-foto-ph {
      width:100%; aspect-ratio:4/3; background:rgba(91,135,160,0.07);
      border-radius:16px; display:flex; align-items:center; justify-content:center;
      font-size:40px; opacity:0.18;
    }
    .r-speciale {
      display:none; align-self:flex-start;
      background:rgba(180,130,30,0.1); color:#8a6020;
      font-size:10px; padding:4px 12px; border-radius:999px;
      letter-spacing:0.8px; text-transform:uppercase; border:1px solid rgba(180,130,30,0.2);
    }
    .r-nome   { font-family:var(--serif); font-size:24px; font-weight:500; line-height:1.2; }
    .r-sub    { font-size:12px; color:var(--c3); margin-top:-4px; }
    .r-prezzo { font-family:var(--serif); font-size:36px; font-weight:600; color:var(--c4); letter-spacing:-1px; }
    .r-stock  { font-size:12px; color:var(--c3); }

    /* AZIONI */
    .azioni { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
    .btn {
      padding:13px 16px; border:none; border-radius:999px; width:100%;
      font-size:13px; font-weight:400; font-family:var(--font);
      cursor:pointer; transition:all 0.18s; text-align:center; letter-spacing:0.1px;
    }
    .btn-primary { background:var(--c4); color:white; box-shadow:0 3px 12px rgba(91,135,160,0.35); }
    .btn-primary:hover { background:var(--c5); transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.4; cursor:default; transform:none; box-shadow:none; }
    .btn-secondary { background:rgba(91,135,160,0.10); color:var(--c4); border:1px solid rgba(91,135,160,0.2); }
    .btn-secondary:hover { background:rgba(91,135,160,0.18); }
    .btn-ghost { background:rgba(30,48,64,0.04); color:var(--c3); border:1px solid rgba(91,135,160,0.12); }
    .btn-ghost:hover { background:rgba(91,135,160,0.08); color:var(--c5); }
    .btn-danger { background:rgba(181,69,27,0.08); color:#b5451b; border:1px solid rgba(181,69,27,0.2); width:auto; padding:13px 18px; flex-shrink:0; }

    /* QTY */
    .qty-wrap {
      display:flex; align-items:center; gap:14px;
      background:rgba(91,135,160,0.06); border-radius:16px; padding:12px 16px;
    }
    .qty-label { font-size:11px; color:var(--c3); flex:1; text-transform:uppercase; letter-spacing:0.5px; }
    .qty-btn {
      width:36px; height:36px; border:1px solid rgba(91,135,160,0.25);
      background:white; color:var(--c4); border-radius:10px; font-size:18px;
      cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center;
    }
    .qty-btn:hover { background:var(--c4); color:white; border-color:var(--c4); }
    .qty-val { font-family:var(--serif); font-size:28px; font-weight:500; color:var(--c4); min-width:36px; text-align:center; }

    .foto-preview { display:none; }
    .foto-preview img { width:100%; border-radius:12px; max-height:160px; object-fit:cover; }

    /* FEEDBACK */
    .feedback { display:none; flex-direction:column; align-items:center; justify-content:center; padding:44px 24px; gap:8px; text-align:center; }
    .feedback.show { display:flex; }
    .fb-icon  { font-size:52px; }
    .fb-testo { font-family:var(--serif); font-size:22px; font-weight:500; color:var(--c6); }
    .fb-sub   { font-size:13px; color:var(--c3); }

    .divider { height:1px; background:rgba(91,135,160,0.12); margin:2px 0; }
  </style>
</head>
<body>
<div class="shell">

  <header class="app-header">
    <img src="annie.png" alt="Annie" class="logo-img">
    <span class="header-label">Scanner</span>
  </header>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="vendita"    onclick="setMode('vendita')">🛍 Vendita</button>
    <button class="mode-btn"        data-mode="inventario" onclick="setMode('inventario')">📦 Inventario</button>
    <button class="mode-btn"        data-mode="check"      onclick="setMode('check')">🔍 Check</button>
  </div>

  <div class="content-card">

    <!-- Tab singola / multipla (solo in vendita) -->
    <div class="vtab-bar" id="vtabBar">
      <button class="vtab-btn active" data-vtab="singola"  onclick="setVtab('singola')">Vendita singola</button>
      <button class="vtab-btn"        data-vtab="multipla" onclick="setVtab('multipla')">Vendita multipla</button>
    </div>

    <!-- Scanner -->
    <div id="readerWrap">
      <div id="reader"></div>
      <button class="start-btn" id="btnAvvia" onclick="avviaScanner()">📷 Avvia scanner</button>
    </div>

    <!-- Carrello multipla (sempre visibile sopra lo scanner quando attivo) -->
    <div id="carrelloArea">
      <div class="carrello-box">
        <div class="carrello-head">
          <span class="carrello-head-label">Carrello</span>
          <span class="carrello-totale" id="carrelloTotale">€ 0.00</span>
        </div>
        <div id="carrelloLista"></div>
      </div>
      <div class="carrello-actions">
        <button class="btn btn-primary" id="btnChiudiMultipla" onclick="chiudiVenditaMultipla()">🏁 Chiudi vendita</button>
        <button class="btn btn-danger"  onclick="svuotaCarrello()">✕</button>
      </div>
    </div>

    <!-- Feedback esito -->
    <div class="feedback" id="feedback">
      <div class="fb-icon"  id="fbIcon"></div>
      <div class="fb-testo" id="fbTesto"></div>
      <div class="fb-sub"   id="fbSub"></div>
      <button class="btn btn-ghost" style="margin-top:14px;width:auto;padding:10px 24px;" onclick="rescan()">↩ Scansiona ancora</button>
    </div>

    <!-- Risultato scansione -->
    <div class="result-inner" id="resultCard">
      <img id="rFoto" class="r-foto" src="" alt="">
      <div id="rFotoPlaceholder" class="r-foto-ph">📷</div>
      <div id="rSpeciale" class="r-speciale">✂️ Modifica speciale</div>
      <div class="r-nome"   id="rNome"></div>
      <div class="r-sub"    id="rSub"></div>
      <div class="r-prezzo" id="rPrezzo"></div>
      <div class="r-stock"  id="rStock"></div>

      <!-- VENDITA SINGOLA -->
      <div id="azioniSingola" class="azioni">
        <button class="btn btn-primary" id="btnVendiSingola" onclick="eseguiVendita()">✅ Segna venduto</button>
        <button class="btn btn-ghost"   onclick="rescan()">↩ Scansiona ancora</button>
      </div>

      <!-- VENDITA MULTIPLA -->
      <div id="azioniMultipla" class="azioni" style="display:none;">
        <button class="btn btn-primary" onclick="aggiungiACarrello()">➕ Aggiungi al carrello</button>
        <button class="btn btn-ghost"   onclick="rescan()">↩ Scansiona ancora</button>
      </div>

      <!-- INVENTARIO -->
      <div id="azioniInventario" class="azioni" style="display:none;">
        <div class="divider"></div>
        <div class="qty-wrap">
          <div class="qty-label">Quantità</div>
          <button class="qty-btn" onclick="cambiaQty(-1)">−</button>
          <span class="qty-val" id="qtyVal">0</span>
          <button class="qty-btn" onclick="cambiaQty(+1)">+</button>
        </div>
        <button class="btn btn-secondary" id="btnFoto" onclick="apriCloudinary()">📷 Cambia foto</button>
        <div class="foto-preview" id="fotoPreview"><img id="fotoPreviewImg" src="" alt=""></div>
        <input type="hidden" id="nuovaFotoUrl">
        <div class="divider"></div>
        <button class="btn btn-primary" onclick="salvaInventario()">💾 Salva</button>
        <button class="btn btn-ghost"   onclick="rescan()">↩ Scansiona ancora</button>
      </div>

      <!-- CHECK -->
      <div id="azioniCheck" class="azioni" style="display:none;">
        <button class="btn btn-ghost" onclick="rescan()">↩ Scansiona ancora</button>
      </div>
    </div>

  </div><!-- /content-card -->
</div><!-- /shell -->

<script src="config.js"></script>
<script>
  let mode             = 'vendita';
  let vtab             = 'singola';
  let scanner          = null;
  let prodottoCorrente = null;
  let qtyCorrente      = 0;
  let carrello         = [];
  let ultimoScanTs     = 0;
  const COOLDOWN_MS    = 2500;

  // ── BIP ──────────────────────────────────────────
  function bip() {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1046, ctx.currentTime); // Do6 — morbido
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }

  // ── JSONP ─────────────────────────────────────────
  function jsonp(params) {
    return new Promise((resolve, reject) => {
      const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const s  = document.createElement('script');
      const t  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 10000);
      function cleanup() { clearTimeout(t); delete window[cb]; if (s.parentNode) document.body.removeChild(s); }
      window[cb] = (data) => { cleanup(); resolve(data); };
      s.onerror  = () => { cleanup(); reject(new Error('JSONP error')); };
      s.src = CONFIG.APPS_SCRIPT_URL + '?' + new URLSearchParams({ ...params, callback: cb });
      document.body.appendChild(s);
    });
  }

  // ── INIT ──────────────────────────────────────────
  window.addEventListener('load', () => { scanner = new Html5Qrcode('reader'); });

  // ── MODE / VTAB ───────────────────────────────────
  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    document.getElementById('vtabBar').classList.toggle('hidden', m !== 'vendita');
    if (prodottoCorrente) mostraRisultato(prodottoCorrente);
    aggiornaCarrelloArea();
  }

  function setVtab(t) {
    vtab = t;
    document.querySelectorAll('.vtab-btn').forEach(b => b.classList.toggle('active', b.dataset.vtab === t));
    if (prodottoCorrente) mostraRisultato(prodottoCorrente);
    aggiornaCarrelloArea();
  }

  // ── SCANNER ───────────────────────────────────────
  function avviaScanner() {
    document.getElementById('btnAvvia').style.display = 'none';
    document.getElementById('feedback').classList.remove('show');
    document.getElementById('resultCard').classList.remove('show');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 220, height: 220 } },
      onScan, () => {}
    ).catch(err => {
      document.getElementById('reader').innerHTML =
        `<div style="padding:32px;text-align:center;color:var(--c3);font-size:13px;">⚠️ Fotocamera non accessibile.<br><small>${err}</small></div>`;
      document.getElementById('btnAvvia').style.display = 'block';
    });
  }

  async function onScan(qrCode) {
    const now = Date.now();
    if (now - ultimoScanTs < COOLDOWN_MS) return;
    ultimoScanTs = now;
    bip();
    await scanner.stop();

    const [, p] = await Promise.all([
      jsonp({ action: 'setScanResult', sku: qrCode }),
      jsonp({ action: 'getProdotto',   sku: qrCode })
    ]);

    if (p.error) { mostraFeedback('❌', 'Prodotto non trovato', qrCode); return; }
    prodottoCorrente = p;
    qtyCorrente      = parseInt(p.Quantità) || 0;
    mostraRisultato(p);
  }

  // ── RISULTATO ─────────────────────────────────────
  function mostraRisultato(p) {
    document.getElementById('feedback').classList.remove('show');
    document.getElementById('resultCard').classList.add('show');

    const rFoto = document.getElementById('rFoto');
    const rPh   = document.getElementById('rFotoPlaceholder');
    if (p.Foto_URL) { rFoto.src = p.Foto_URL; rFoto.classList.add('show'); rPh.style.display = 'none'; }
    else             { rFoto.classList.remove('show'); rPh.style.display = 'flex'; }

    document.getElementById('rSpeciale').style.display = p.Speciale === 'SI' ? 'inline-block' : 'none';
    document.getElementById('rNome').textContent   = p.Nome;
    document.getElementById('rSub').textContent    = [p.Taglia, p.Colore, p.Brand].filter(Boolean).join(' · ');
    document.getElementById('rPrezzo').textContent = '€ ' + p.Prezzo;
    document.getElementById('rStock').textContent  = 'In magazzino: ' + p.Quantità + ' pz';
    document.getElementById('qtyVal').textContent  = qtyCorrente;
    document.getElementById('nuovaFotoUrl').value  = '';
    document.getElementById('fotoPreview').style.display = 'none';
    document.getElementById('btnFoto').textContent = '📷 Cambia foto';

    const isSingola  = mode === 'vendita' && vtab === 'singola';
    const isMultipla = mode === 'vendita' && vtab === 'multipla';
    document.getElementById('azioniSingola').style.display    = isSingola  ? 'flex' : 'none';
    document.getElementById('azioniMultipla').style.display   = isMultipla ? 'flex' : 'none';
    document.getElementById('azioniInventario').style.display = mode === 'inventario' ? 'flex' : 'none';
    document.getElementById('azioniCheck').style.display      = mode === 'check'      ? 'flex' : 'none';

    const btn = document.getElementById('btnVendiSingola');
    btn.disabled = false; btn.textContent = '✅ Segna venduto';
  }

  // ── VENDITA SINGOLA ───────────────────────────────
  async function eseguiVendita() {
    const btn = document.getElementById('btnVendiSingola');
    btn.disabled = true; btn.textContent = '⏳ Registrazione...';
    const res = await jsonp({ action: 'vendiProdotto', sku: prodottoCorrente.SKU });
    if (res.success) {
      // invia riepilogo al PC (1 solo capo) poi mostra feedback
      await jsonp({ action: 'setRiepilogo', capi: JSON.stringify([prodottoCorrente]) });
      mostraFeedback('✅', 'Vendita registrata', prodottoCorrente.Nome);
    } else {
      btn.disabled = false; btn.textContent = '✅ Segna venduto';
      mostraFeedback('❌', res.error || 'Errore', '');
    }
  }

  // ── VENDITA MULTIPLA ──────────────────────────────
  function aggiungiACarrello() {
    if (!prodottoCorrente) return;
    carrello.push({ ...prodottoCorrente });
    aggiornaCarrelloArea();
    document.getElementById('resultCard').classList.remove('show');
    setTimeout(() => avviaScanner(), 250);
  }

  function aggiornaCarrelloArea() {
    const area = document.getElementById('carrelloArea');
    const show = carrello.length > 0 && vtab === 'multipla' && mode === 'vendita';
    area.style.display = show ? 'flex' : 'none';
    if (!show) return;
    const totale = carrello.reduce((s,c) => s + parseFloat(c.Prezzo||0), 0);
    document.getElementById('carrelloTotale').textContent = '€ ' + totale.toFixed(2);
    document.getElementById('carrelloLista').innerHTML = carrello.map((c,i) => `
      <div class="ci">
        <div><div class="ci-nome">${c.Nome}</div><div class="ci-det">${[c.Taglia,c.Colore].filter(Boolean).join(' · ')}</div></div>
        <div class="ci-right">
          <div class="ci-prezzo">€ ${c.Prezzo}</div>
          <button class="ci-rm" onclick="rimuoviDaCarrello(${i})">✕</button>
        </div>
      </div>
    `).join('');
  }

  function rimuoviDaCarrello(i) { carrello.splice(i,1); aggiornaCarrelloArea(); }

  function svuotaCarrello() {
    if (confirm('Svuotare il carrello?')) { carrello = []; aggiornaCarrelloArea(); }
  }

  async function chiudiVenditaMultipla() {
    if (!carrello.length) return;
    const btn = document.getElementById('btnChiudiMultipla');
    btn.disabled = true; btn.textContent = '⏳ Invio...';
    const risultati = [];
    for (const capo of carrello) {
      const res = await jsonp({ action: 'vendiProdotto', sku: capo.SKU });
      if (res.success) risultati.push(capo);
    }
    await jsonp({ action: 'setRiepilogo', capi: JSON.stringify(risultati) });
    carrello = [];
    aggiornaCarrelloArea();
    btn.disabled = false; btn.textContent = '🏁 Chiudi vendita';
    const totale = risultati.reduce((s,c) => s + parseFloat(c.Prezzo||0), 0);
    mostraFeedback('✅', risultati.length + ' capi venduti', '€ ' + totale.toFixed(2));
  }

  // ── INVENTARIO ────────────────────────────────────
  function cambiaQty(delta) {
    qtyCorrente = Math.max(0, qtyCorrente + delta);
    document.getElementById('qtyVal').textContent = qtyCorrente;
  }

  async function salvaInventario() {
    const btn = document.querySelector('#azioniInventario .btn-primary');
    btn.disabled = true; btn.textContent = '⏳ Salvataggio...';
    const fotoUrl = document.getElementById('nuovaFotoUrl').value;
    const ops = [jsonp({ action: 'aggiornaQuantita', sku: prodottoCorrente.SKU, quantita: qtyCorrente })];
    if (fotoUrl) ops.push(jsonp({ action: 'aggiornaFoto', sku: prodottoCorrente.SKU, foto_url: fotoUrl }));
    await Promise.all(ops);
    btn.disabled = false; btn.textContent = '💾 Salva';
    mostraFeedback('💾', 'Salvato!', prodottoCorrente.Nome + ' → ' + qtyCorrente + ' pz');
  }

  function apriCloudinary() {
    const w = cloudinary.createUploadWidget({
      cloudName: CONFIG.CLOUDINARY_CLOUD_NAME, uploadPreset: CONFIG.CLOUDINARY_UPLOAD_PRESET,
      sources: ['camera','local'], multiple: false, maxFileSize: 5000000,
      transformation: [{ width:800, crop:'limit', quality:'auto' }],
    }, (error, result) => {
      if (!error && result && result.event === 'success') {
        const url = result.info.secure_url;
        document.getElementById('nuovaFotoUrl').value = url;
        document.getElementById('fotoPreviewImg').src = url;
        document.getElementById('fotoPreview').style.display = 'block';
        document.getElementById('rFoto').src = url; document.getElementById('rFoto').classList.add('show');
        document.getElementById('rFotoPlaceholder').style.display = 'none';
        document.getElementById('btnFoto').textContent = '✅ Foto caricata';
      }
    });
    w.open();
  }

  // ── UTILS ─────────────────────────────────────────
  function mostraFeedback(icon, testo, sub) {
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('fbIcon').textContent  = icon;
    document.getElementById('fbTesto').textContent = testo;
    document.getElementById('fbSub').textContent   = sub;
    document.getElementById('feedback').classList.add('show');
  }

  function rescan() {
    prodottoCorrente = null;
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('feedback').classList.remove('show');
    document.getElementById('btnAvvia').style.display = 'block';
  }
</script>
</body>
</html>
